name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build
        run: |
          unzip -o *.zip || true
          GW=$(find . -name gradlew | head -n 1)
          chmod +x "$GW"
          cd "$(dirname "$GW")"
          ./gradlew assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AppLock-Fixed-Version
          path: "**/app-debug.apk"
          
