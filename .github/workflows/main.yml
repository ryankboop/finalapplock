name: Build Fixed APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Unzip and Find Files
        run: |
          # 1. Unzip the file you uploaded
          unzip *.zip
          # 2. Find where gradlew is hiding and move there
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          cd $(dirname $GRADLEW_PATH)
          # 3. Make it executable
          chmod +x gradlew
          # 4. Start the build
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AppLock-Fixed
          path: "**/app-debug.apk"
          
